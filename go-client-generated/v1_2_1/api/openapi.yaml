          example: 8
          type: integer
      required:
      - errors
      - reencrypted
      - total
      type: object
    ApiInfo_status:
      additionalProperties: false
      example:
        code: OK
        time: 2026-01-17T12:00:00Z
      properties:
        code:
          description: "Status code indicating system health: OK (all components healthy),\
            \ DEGRADED (server up but database or Redis unhealthy), ERROR (critical\
            \ failure)"
          enum:
          - OK
          - DEGRADED
          - ERROR
          maxLength: 512
          pattern: "^[a-zA-Z0-9_-]*$"
          type: string
        time:
          description: "Current server time in UTC, formatted as RFC 3339"
          format: date-time
          maxLength: 64
          pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(\\.[0-9]{1,6})?(Z|[+-][0-9]{2}:[0-9]{2})$"
          type: string
      required:
      - code
      - time
      type: object
    ApiInfo_service:
      additionalProperties: false
      example:
        name: TMI Threat Modeling Interface
        build: 1.0.0
      properties:
        name:
          description: Name of the service
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        build:
          description: Current build number
          maxLength: 32
          pattern: "^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}(-[a-zA-Z0-9]{7})?$"
          type: string
      required:
      - build
      - name
      type: object
    ApiInfo_api:
      additionalProperties: false
      example:
        version: 1.0.0
        specification: https://api.example.com/openapi.json
      properties:
        version:
          description: API version
          maxLength: 32
          pattern: "^[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}$"
          type: string
        specification:
          description: URL to the API specification
          format: uri
          maxLength: 1000
          pattern: "^\\s*https?:\\/\\/[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\\\
            .[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*(:[0-9]{1,5})?(\\/[^\\s]*)?\\\
            s*$"
          type: string
      required:
      - specification
      - version
      type: object
    ApiInfo_operator:
      additionalProperties: false
      example:
        name: Acme Corporation
        contact: support@acme.example.com
      properties:
        name:
          description: Operator name from environment variables
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        contact:
          description: Operator contact information from environment variables
          maxLength: 1024
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
      required:
      - contact
      - name
      type: object
    ApiInfo_health:
      additionalProperties: false
      description: Detailed health status of system components. Only present when
        status is DEGRADED.
      example:
        database:
          status: healthy
          latency_ms: 5
        redis:
          status: healthy
          latency_ms: 2
      properties:
        database:
          $ref: "#/components/schemas/ComponentHealth"
        redis:
          $ref: "#/components/schemas/ComponentHealth"
      type: object
    BaseDiagram_image:
      additionalProperties: false
