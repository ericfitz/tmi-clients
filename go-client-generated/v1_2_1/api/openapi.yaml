            X-RateLimit-Limit:
              description: Maximum number of requests allowed in the current time
                window
              explode: false
              schema:
                example: 1000
                type: integer
              style: simple
            X-RateLimit-Remaining:
              description: Number of requests remaining in the current time window
              explode: false
              schema:
                example: 999
                type: integer
              style: simple
            X-RateLimit-Reset:
              description: Unix epoch seconds when the rate limit window resets
              explode: false
              schema:
                example: 1735689600
                type: integer
              style: simple
