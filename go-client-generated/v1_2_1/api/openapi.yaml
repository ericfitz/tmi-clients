          minLength: 1
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        url:
          description: Webhook endpoint URL (must be HTTPS)
          format: uri
          maxLength: 1024
          minLength: 8
          pattern: "^\\s*https?:\\/\\/[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\\\
            .[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*(:[0-9]{1,5})?(\\/[^\\s]*)?\\\
