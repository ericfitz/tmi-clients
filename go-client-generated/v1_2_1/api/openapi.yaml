        principal_type: user
        provider: google
        provider_id: alice@example.com
        display_name: Alice Anderson
        email: alice@example.com
      properties:
        principal_type:
          description: "Type of principal: user (individual) or group"
          enum:
          - user
          - group
          type: string
        provider:
          description: "Identity provider name (e.g., \"google\", \"github\", \"microsoft\"\
