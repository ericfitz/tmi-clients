          be included in the callback response.
        explode: true
        in: query
        name: state
        required: false
        schema:
          example: random_state_abc123
          maxLength: 256
          pattern: "^[a-zA-Z0-9_~.+/=-]*$"
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
          description: JWT tokens issued successfully (legacy mode when no client_callback
            provided)
