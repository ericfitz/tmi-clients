  /threat_models:
    get:
      description: Returns a list of threat models accessible to the authenticated
        user with enhanced metadata and entity counts
      operationId: listThreatModels
      parameters:
      - description: Maximum number of results to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Number of results to skip
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          maximum: 1000000000
          minimum: 0
          type: integer
        style: form
      - description: Filter by owner name or email
        explode: true
        in: query
        name: owner
        required: false
        schema:
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter by threat model name (partial match)
        explode: true
        in: query
        name: name
        required: false
        schema:
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter by threat model description (partial match)
        explode: true
        in: query
        name: description
        required: false
        schema:
          maxLength: 1000
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter by issue URI (partial match)
        explode: true
        in: query
        name: issue_uri
        required: false
        schema:
          maxLength: 1000
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter results created after this timestamp (ISO 8601)
        explode: true
        in: query
        name: created_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Filter results created before this timestamp (ISO 8601)
        explode: true
        in: query
        name: created_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Filter results modified after this timestamp (ISO 8601)
        explode: true
        in: query
        name: modified_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Filter results modified before this timestamp (ISO 8601)
        explode: true
        in: query
        name: modified_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: "Filter by status value (exact match). To filter by multiple\
          \ statuses, use multiple status parameters or comma-separated values."
        explode: true
        in: query
        name: status
        required: false
        schema:
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter threat models where status was updated after this timestamp
          (RFC3339)
        explode: true
        in: query
        name: status_updated_after
        required: false
        schema:
