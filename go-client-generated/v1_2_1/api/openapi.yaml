        default: 20
        maximum: 100
        minimum: 1
        type: integer
      style: form
    PaginationOffset:
      description: Number of results to skip
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        maximum: 1000000000
        minimum: 0
        type: integer
      style: form
    CreatedAfter:
      description: Filter results created after this timestamp (ISO 8601)
      explode: true
      in: query
      name: created_after
      required: false
      schema:
        format: date-time
        type: string
      style: form
    CreatedBefore:
      description: Filter results created before this timestamp (ISO 8601)
      explode: true
      in: query
      name: created_before
      required: false
      schema:
        format: date-time
        type: string
      style: form
    ModifiedAfter:
      description: Filter results modified after this timestamp (ISO 8601)
      explode: true
      in: query
      name: modified_after
      required: false
      schema:
        format: date-time
        type: string
      style: form
    ModifiedBefore:
      description: Filter results modified before this timestamp (ISO 8601)
      explode: true
      in: query
      name: modified_before
      required: false
      schema:
        format: date-time
        type: string
      style: form
    IdpPathParam:
      description: "Identity provider ID (e.g., saml_okta, saml_azure)"
      explode: false
      in: path
      name: idp
      required: true
      schema:
        maxLength: 100
        pattern: "^[a-zA-Z][a-zA-Z0-9_-]*$"
        type: string
      style: simple
    IdpQueryParam:
      description: OAuth provider identifier. Defaults to 'tmi' provider in non-production
        builds if not specified.
      explode: true
      in: query
      name: idp
      required: false
      schema:
        maxLength: 100
        pattern: "^[a-zA-Z][a-zA-Z0-9_-]*$"
        type: string
      style: form
    ClientCallbackQueryParam:
      description: "Client callback URL where TMI should redirect after successful\
        \ OAuth completion with tokens in URL fragment (#access_token=...). If not\
        \ provided, tokens are returned as JSON response. Per OAuth 2.0 implicit flow\
        \ spec, tokens are in fragments to prevent logging."
      explode: true
      in: query
      name: client_callback
      required: false
      schema:
        example: http://localhost:4200/oauth2/callback
        format: uri
        maxLength: 1000
        pattern: "^\\s*https?:\\/\\/[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\\\
          .[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*(:[0-9]{1,5})?(\\/[^\\s]*)?\\\
          s*$"
        type: string
      style: form
    StateQueryParam:
      description: CSRF protection state parameter. Recommended for security. Will
        be included in the callback response.
      explode: true
      in: query
      name: state
      required: false
      schema:
        example: random_state_abc123
        maxLength: 256
        pattern: "^[a-zA-Z0-9_~.+/=-]*$"
        type: string
      style: form
    LoginHintQueryParam:
      description: "User identity hint for TMI OAuth provider. Allows specifying a\
        \ desired user identity for testing and automation. Only supported by the\
        \ TMI provider (ignored by production providers like Google, GitHub, etc.).\
        \ Must be 3-20 characters, alphanumeric and hyphens only."
      explode: true
      in: query
      name: login_hint
      required: false
      schema:
        example: alice
        maxLength: 1000
        pattern: "^[a-zA-Z0-9-]{3,20}$"
        type: string
      style: form
    ScopeQueryParam:
      description: "OAuth 2.0 scope parameter. For OpenID Connect, must include \"\
        openid\". Supports \"profile\" and \"email\" scopes. Other scopes are silently\
        \ ignored. Space-separated values."
      explode: true
      in: query
      name: scope
      required: true
      schema:
        example: openid profile email
        maxLength: 256
        pattern: "^[a-zA-Z0-9_][a-zA-Z0-9_ ]*[a-zA-Z0-9_]$"
        type: string
      style: form
    CodeChallengeQueryParam:
      description: "PKCE code challenge (RFC 7636) - Base64url-encoded SHA256 hash\
        \ of the code_verifier. Must be 43-128 characters using unreserved characters\
        \ [A-Za-z0-9-._~]. The server associates this with the authorization code\
        \ for later verification during token exchange."
      explode: true
      in: query
      name: code_challenge
      required: true
      schema:
        example: E9Melhoa2OwvFrEMTJguCHaoeK1t8URWbuGJSstw-cM
        maxLength: 128
        minLength: 43
        pattern: "^[A-Za-z0-9\\-._~]{43,128}$"
        type: string
      style: form
    CodeChallengeMethodQueryParam:
      description: PKCE code challenge method (RFC 7636) - Specifies the transformation
        applied to the code_verifier. Only "S256" (SHA256) is supported for security.
        The "plain" method is not supported.
      explode: true
      in: query
      name: code_challenge_method
      required: true
      schema:
        enum:
        - S256
        example: S256
        type: string
      style: form
    CodeQueryParam:
      description: Authorization code from the OAuth provider
      explode: true
      in: query
      name: code
      required: true
      schema:
        maxLength: 512
        pattern: "^[a-zA-Z0-9_~.+/=-]*$"
        type: string
      style: form
    OwnerQueryParam:
      description: Filter by owner name or email
      explode: true
      in: query
      name: owner
      required: false
      schema:
        maxLength: 256
        pattern: "^[^\\x00-\\x1F]*$"
        type: string
      style: form
    NameQueryParam:
