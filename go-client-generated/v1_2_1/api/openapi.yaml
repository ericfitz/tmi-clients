          items:
            description: UUID reference to an Asset object
            format: uuid
            maxLength: 36
            pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
            type: string
          maxItems: 100
          minItems: 1
          type: array
          uniqueItems: true
      type: object
    Node_allOf_position:
