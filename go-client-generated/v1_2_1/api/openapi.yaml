        \ namespace"
      properties:
        _metadata:
          description: Reserved namespace for structured business metadata
          items:
            $ref: "#/components/schemas/Metadata"
          maxItems: 100
          type: array
        security_boundary:
          default: false
          description: Indicates whether this cell represents a security boundary
