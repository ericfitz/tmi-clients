        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Number of results to skip
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          maximum: 1000000000
          minimum: 0
          type: integer
        style: form
      - description: "Sort order (e.g., created_at:desc, name:asc, severity:desc,\
          \ score:desc)"
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: created_at:desc
          maxLength: 1000
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter results created after this timestamp (ISO 8601)
        explode: true
        in: query
        name: created_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - description: Filter results created before this timestamp (ISO 8601)
