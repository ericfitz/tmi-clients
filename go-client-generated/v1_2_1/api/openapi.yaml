  /oauth2/revoke:
    post:
      description: "Revokes an OAuth 2.0 token per RFC 7009. The token to revoke is\
        \ passed in the request body. Supports both access tokens and refresh tokens.\
        \ Authentication is required via Bearer token in the Authorization header\
        \ OR client credentials (client_id/client_secret) in the request body. Per\
        \ RFC 7009, the response is always 200 OK regardless of whether the token\
        \ was valid, to prevent token existence disclosure."
      operationId: revokeToken
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: "#/components/schemas/TokenRevocationRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRevocationRequest"
        description: Token revocation request per RFC 7009
        required: true
      responses:
        "200":
          content:
            application/json:
              example: {}
              schema:
                additionalProperties: false
                properties: {}
                type: object
