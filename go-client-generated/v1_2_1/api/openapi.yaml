  /threat_models/{threat_model_id}/threats:
    get:
      description: Returns a paginated list of threats within the specified threat
        model
      operationId: getThreatModelThreats
      parameters:
      - description: Threat model identifier
        explode: false
        in: path
        name: threat_model_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      - description: Maximum number of results to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Number of results to skip
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          maximum: 1000000000
          minimum: 0
          type: integer
        style: form
      - description: "Sort order (e.g., created_at:desc, name:asc, severity:desc,\
          \ score:desc)"
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: created_at:desc
          maxLength: 1000
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter by threat model name (partial match)
        explode: true
        in: query
        name: name
        required: false
        schema:
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter by threat model description (partial match)
        explode: true
        in: query
        name: description
        required: false
        schema:
          maxLength: 1000
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: "Filter by threat types (AND logic). Threat must contain ALL\
          \ specified types. Example: ?threat_type=Tampering&threat_type=Spoofing"
        example:
        - spoofing
        - tampering
        explode: true
        in: query
        name: threat_type
        required: false
        schema:
          example:
          - spoofing
          - tampering
          items:
            type: string
          maxItems: 50
          type: array
        style: form
      - description: Filter by severity level (exact match)
        explode: true
        in: query
        name: severity
        required: false
        schema:
          enum:
          - Unknown
          - None
          - Low
          - Medium
          - High
          - Critical
          maxLength: 1000
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter by priority (exact match)
        explode: true
        in: query
        name: priority
        required: false
        schema:
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: "Filter by status value (exact match). To filter by multiple\
          \ statuses, use multiple status parameters or comma-separated values."
        explode: true
        in: query
        name: status
        required: false
        schema:
          maxLength: 256
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        style: form
      - description: Filter by diagram ID (exact match)
        explode: true
        in: query
        name: diagram_id
        required: false
        schema:
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: form
      - description: Filter by cell ID (exact match)
        explode: true
        in: query
        name: cell_id
        required: false
        schema:
          format: uuid
          maxLength: 36
          pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
          type: string
        style: form
