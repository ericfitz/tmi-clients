      description: OAuth 2.0 token revocation request per RFC 7009
      properties:
        token:
          description: The token to be revoked (access token or refresh token)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          maxLength: 2000
          minLength: 1
          pattern: "^[^\\x00-\\x1F]*$"
          type: string
        token_type_hint:
          description: "A hint about the type of the token. If omitted, the server\
            \ will attempt to determine the token type."
          enum:
          - access_token
          - refresh_token
          - null
          example: access_token
          nullable: true
          type: string
        client_id:
          description: Client identifier for client credentials authentication (alternative
            to Bearer token)
          example: tmi_cc_abc123...
          maxLength: 256
          nullable: true
          type: string
        client_secret:
          description: Client secret (required if client_id is provided)
          example: secret123...
          maxLength: 256
          nullable: true
          type: string
      required:
      - token
      type: object
    CVSSScore:
