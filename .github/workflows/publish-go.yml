name: Validate Go Client

on:
  release:
    types: [published]

jobs:
  validate:
    if: startsWith(github.ref, 'refs/tags/go-v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-client-generated
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v ./...
