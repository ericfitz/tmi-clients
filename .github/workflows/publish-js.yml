name: Publish JavaScript Client to npm

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/ts-v')
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write  # Required for npm provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Determine version directory
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#ts-v}"
          echo "pkg_dir=typescript-client-generated/v${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version directory exists
        run: |
          if [ ! -d "${{ steps.version.outputs.pkg_dir }}" ]; then
            echo "::error::Directory ${{ steps.version.outputs.pkg_dir }} does not exist"
            exit 1
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: ${{ steps.version.outputs.pkg_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: npm ci

      - name: Build
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: npm run build

      - name: Run tests
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        # --if-present skips versions with no "test" script; --passWithNoTests
        # keeps vitest from failing a version whose test script finds no tests.
        run: npm run test --if-present -- --passWithNoTests

      - name: Publish to npm
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
