name: Publish Python Client to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing (OIDC)
    defaults:
      run:
        working-directory: python-client-generated
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Install package with test dependencies
        run: pip install -e ".[test]"

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(python -c "import tmi_client; print(tmi_client.__version__)" 2>/dev/null || python -c "from importlib.metadata import version; print(version('tmi-client'))")
          TAG_VERSION="${GITHUB_REF_NAME#python-v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Package version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: pytest test/ -v --tb=short

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python-client-generated/dist/
