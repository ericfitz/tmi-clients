name: Publish Python Client

on:
  release:
    types: [published]

jobs:
  build-and-test:
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Determine version directory
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#python-v}"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_dir=python-client-generated/v${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version directory exists
        run: |
          if [ ! -d "${{ steps.version.outputs.pkg_dir }}" ]; then
            echo "::error::Directory ${{ steps.version.outputs.pkg_dir }} does not exist"
            exit 1
          fi

      - name: Install build tools
        run: pip install build

      - name: Install package with test dependencies
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: pip install -e ".[test]" || pip install -e .

      - name: Verify package version matches tag
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: |
          PKG_VERSION=$(python -c "import tmi_client; print(tmi_client.__version__)" 2>/dev/null || python -c "from importlib.metadata import version; print(version('tmi-client'))")
          TAG_VERSION="${{ steps.version.outputs.tag_version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Package version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Run tests
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        # pytest exit code 5 means "no tests collected" — treat that as success
        # so a version with an empty test/ dir doesn't fail. Real test failures
        # (exit 1) still fail.
        run: |
          pip install pytest
          code=0
          pytest test/ -v --tb=short || code=$?
          if [ "$code" -eq 5 ]; then
            echo "pytest collected no tests (exit 5) — treating as success"
            exit 0
          fi
          exit "$code"

      - name: Build package
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-dist
          path: ${{ steps.version.outputs.pkg_dir }}/dist/

  publish-testpypi:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
