name: Publish Python Client

on:
  release:
    types: [published]

jobs:
  build-and-test:
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine version directory
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#python-v}"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "pkg_dir=python-client-generated/v${TAG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version directory exists
        run: |
          if [ ! -d "${{ steps.version.outputs.pkg_dir }}" ]; then
            echo "::error::Directory ${{ steps.version.outputs.pkg_dir }} does not exist"
            exit 1
          fi

      - name: Install build tools
        run: pip install build

      - name: Install package with test dependencies
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: pip install -e ".[test]" || pip install -e .

      - name: Verify package version matches tag
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: |
          PKG_VERSION=$(python -c "import tmi_client; print(tmi_client.__version__)" 2>/dev/null || python -c "from importlib.metadata import version; print(version('tmi-client'))")
          TAG_VERSION="${{ steps.version.outputs.tag_version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Package version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Run tests
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: |
          pip install pytest
          pytest test/ -v --tb=short

      - name: Build package
        working-directory: ${{ steps.version.outputs.pkg_dir }}
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: ${{ steps.version.outputs.pkg_dir }}/dist/

  publish-testpypi:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
