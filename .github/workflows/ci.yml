name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Derive the version matrices from the committed client directories, so CI
  # tests exactly what is in the tree. Client versions come from each spec's
  # info.version at generation time (see regenerate_all.py); the directory
  # names are the source of truth here.
  #   versions   -> dotted dirs for Python/TypeScript  (e.g. v1.4.0 -> 1.4.0)
  #   go_versions-> underscored dirs for Go            (e.g. v1_4_0 -> 1_4_0)
  setup:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.matrix.outputs.versions }}
      go_versions: ${{ steps.matrix.outputs.go_versions }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: matrix
        run: |
          versions=$(ls -d python-client-generated/v[0-9]*/ 2>/dev/null \
            | sed 's#.*/v##; s#/##' \
            | jq -Rsc 'split("\n") | map(select(length > 0))')
          go_versions=$(ls -d go-client-generated/v[0-9]*/ 2>/dev/null \
            | sed 's#.*/v##; s#/##' \
            | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "versions=$versions" >> "$GITHUB_OUTPUT"
          echo "go_versions=$go_versions" >> "$GITHUB_OUTPUT"

  test-python:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.setup.outputs.versions) }}
    defaults:
      run:
        working-directory: python-client-generated/v${{ matrix.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run tests
        # pytest exit code 5 means "no tests collected" — treat that as success
        # so a version with an empty test/ dir doesn't fail CI. Real test
        # failures (exit 1) still fail.
        run: |
          code=0
          uv run --with pytest python3 -m pytest test/ -v --tb=short || code=$?
          if [ "$code" -eq 5 ]; then
            echo "pytest collected no tests (exit 5) — treating as success"
            exit 0
          fi
          exit "$code"

  test-js:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.setup.outputs.versions) }}
    defaults:
      run:
        working-directory: typescript-client-generated/v${{ matrix.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: typescript-client-generated/v${{ matrix.version }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        # --if-present skips versions with no "test" script; --passWithNoTests
        # keeps vitest from failing a version whose test script finds no tests.
        run: npm run test --if-present -- --passWithNoTests

  test-go:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.setup.outputs.go_versions) }}
    defaults:
      run:
        working-directory: go-client-generated/v${{ matrix.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # Build each module with the Go version declared in its own go.mod.
          go-version-file: go-client-generated/v${{ matrix.version }}/go.mod
          cache-dependency-path: go-client-generated/v${{ matrix.version }}/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v ./...
